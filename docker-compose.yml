services:
  db:
    image: postgres:15
    container_name: qpostgres_classicmodels
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
      